# Custom Analyses Configuration
#
# Define reusable "gold SQL" snippets that encode tribal knowledge about the
# database. The Text-To-SQL agent uses these as reference when constructing
# queries — if a user question matches an analysis, the agent can adapt the
# provided SQL instead of generating from scratch.
#
# Each entry has:
#   name        - human-readable analysis name
#   description - what the analysis calculates / returns
#   sql         - the reference SQL snippet (gold SQL)
#   tables      - (optional) tables involved, helps the agent match context
#   tags        - (optional) keywords for similarity matching

custom_analyses:
  - name: "Total Ticket Sales of World Cup 2026"
    description: "Calculates the total number of tickets sold for the World Cup 2026."
    sql: |
      SELECT SUM(quantity) AS total_tickets_sold
      FROM sold_tickets
      WHERE event = 'World Cup 2026'
    tables:
      - "sold_tickets"
    tags:
      - "tickets"
      - "world cup"
      - "sales"

  - name: "Top Achiever by Region"
    description: "Returns the sales person who sold the most within each region."
    sql: |
      SELECT Region, SalesPersonID, Orders
      FROM (
          SELECT
              Region,
              SalesPersonID,
              COUNT(*) AS Orders,
              RANK() OVER (PARTITION BY Region ORDER BY COUNT(*) DESC) AS rn
          FROM orders
          GROUP BY Region, SalesPersonID
      ) t
      WHERE rn = 1
    tables:
      - "orders"
    tags:
      - "sales"
      - "ranking"
      - "region"

  - name: "Monthly Revenue by Product Category"
    description: "Aggregates monthly revenue broken down by product category."
    sql: |
      SELECT
          DATE_TRUNC('month', order_date) AS month,
          p.category,
          SUM(ol.quantity * ol.unit_price) AS revenue
      FROM order_lines ol
      JOIN products p ON ol.product_id = p.product_id
      GROUP BY month, p.category
      ORDER BY month DESC, revenue DESC
    tables:
      - "order_lines"
      - "products"
    tags:
      - "revenue"
      - "monthly"
      - "category"

  - name: "Customer Churn Rate"
    description: "Calculates the percentage of customers who have not placed an order in the last 90 days compared to the previous 90-day period."
    sql: |
      WITH previous_period AS (
          SELECT DISTINCT customer_id
          FROM orders
          WHERE order_date BETWEEN CURRENT_DATE - INTERVAL '180 days'
                                AND CURRENT_DATE - INTERVAL '91 days'
      ),
      recent_period AS (
          SELECT DISTINCT customer_id
          FROM orders
          WHERE order_date >= CURRENT_DATE - INTERVAL '90 days'
      )
      SELECT
          COUNT(pp.customer_id) AS previous_customers,
          COUNT(pp.customer_id) - COUNT(rp.customer_id) AS churned,
          ROUND(
              (COUNT(pp.customer_id) - COUNT(rp.customer_id)) * 100.0
              / NULLIF(COUNT(pp.customer_id), 0), 2
          ) AS churn_rate_pct
      FROM previous_period pp
      LEFT JOIN recent_period rp ON pp.customer_id = rp.customer_id
    tables:
      - "orders"
    tags:
      - "churn"
      - "retention"
      - "customers"
